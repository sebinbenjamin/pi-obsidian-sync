; CouchDB configuration for Obsidian LiveSync
; Mounted read-only into the container at /opt/couchdb/etc/local.d/livesync.ini
; Changes require container restart: docker compose restart couchdb

[chttpd]
require_valid_user = true
enable_cors = true
; 64 MB — CouchDB default. The LiveSync guide uses 4 GB which would
; OOM a Raspberry Pi on a single large request. 64 MB is more than
; enough for LiveSync batch operations.
max_http_request_size = 67108864

[chttpd_auth]
require_valid_user = true

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true
; Bind legacy HTTP interface to localhost only
bind_address = 127.0.0.1

[cors]
credentials = true
; app://obsidian.md       — Obsidian desktop (Electron)
; capacitor://localhost   — Obsidian mobile (iOS/Android)
; http://localhost         — local dev/testing
origins = app://obsidian.md,capacitor://localhost,http://localhost

[couchdb]
; 50 MB — accommodates large attachments (images, PDFs) in vaults
max_document_size = 50000000
single_node = true
